version: '3.9'

services:
  # ─────────────────────────────────────────
  # PostgreSQL Veritabanı
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: obilet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: obilet
      POSTGRES_PASSWORD: obilet123
      POSTGRES_DB: obiletdb
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - obilet_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obilet -d obiletdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # pgAdmin — Veritabanı Yönetim Arayüzü
  # Erişim: http://localhost:5050
  # Email: admin@obilet.com | Şifre: admin123
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: obilet_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@obilet.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - obilet_network
    depends_on:
      postgres:
        condition: service_healthy

# ─────────────────────────────────────────
# Kalıcı Veri Hacimleri (Volumes)
# ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

# ─────────────────────────────────────────
# İzole Ağ
# ─────────────────────────────────────────
networks:
  obilet_network:
    driver: bridge
