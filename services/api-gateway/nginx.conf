worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Loglama ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream=$upstream_addr '
                    'rt=$request_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log main;

    # ─── Performans ───────────────────────────────────────────
    sendfile         on;
    tcp_nopush       on;
    tcp_nodelay      on;
    keepalive_timeout 65;
    client_max_body_size 10m;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ─── Rate Limiting Zonları ────────────────────────────────
    # Auth: Kaba kuvvet saldırılarına karşı sıkı sınır
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # Genel API: Normal kullanım için
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=100r/m;
    # Ödeme: Ekstra dikkatli
    limit_req_zone $binary_remote_addr zone=pay_limit:10m  rate=20r/m;

    # ─── Upstream Servisler ───────────────────────────────────
    upstream auth_service {
        server auth-service:8001;
        keepalive 32;
    }

    upstream user_service {
        server user-service:8002;
        keepalive 32;
    }

    upstream trip_service {
        server trip-service:8003;
        keepalive 32;
    }

    upstream booking_service {
        server booking-service:8004;
        keepalive 32;
    }

    upstream payment_service {
        server payment-service:8005;
        keepalive 32;
    }

    upstream notification_service {
        server notification-service:8006;
        keepalive 32;
    }

    # ─── Ana Server Bloğu ─────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # CORS — tüm isteklere ekle
        set $cors_origin "";
        if ($http_origin ~* "^https?://(localhost:3000|localhost:8000)$") {
            set $cors_origin $http_origin;
        }

        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept, X-Request-ID' always;
        add_header 'X-Service'                        'obilet-api-gateway' always;

        # Preflight OPTIONS isteği
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ─── Gateway Sağlık Kontrolü ──────────────────────────
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"api-gateway","version":"1.0.0"}';
        }

        # ─── Auth Service ─────────────────────────────────────
        # Rate limit: 10 istek/dakika (brute-force koruması)
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://auth_service/api/v1/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # Auth Swagger (development)
        location /auth/docs {
            proxy_pass http://auth_service/docs;
            proxy_set_header Host $host;
        }
        location /auth/openapi.json {
            proxy_pass http://auth_service/openapi.json;
            proxy_set_header Host $host;
        }

        # ─── User Service ─────────────────────────────────────
        location /api/v1/users/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://user_service/api/v1/users/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ─── Trip Service ─────────────────────────────────────
        location /api/v1/trips/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass         http://trip_service/api/v1/trips/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;  # Arama sorguları uzun sürebilir
        }

        # ─── Booking Service ──────────────────────────────────
        location /api/v1/bookings/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://booking_service/api/v1/bookings/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ─── Payment Service ──────────────────────────────────
        location /api/v1/payments/ {
            limit_req zone=pay_limit burst=5 nodelay;

            proxy_pass         http://payment_service/api/v1/payments/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # ─── Notification Service ─────────────────────────────
        location /api/v1/notifications/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://notification_service/api/v1/notifications/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ─── 404 Handler ──────────────────────────────────────
        location / {
            default_type application/json;
            return 404 '{"error":"not_found","message":"Bu endpoint mevcut değil. /health veya /api/v1/* kullanın."}';
        }

        # ─── Rate Limit Yanıtı ────────────────────────────────
        error_page 429 @too_many_requests;
        location @too_many_requests {
            default_type application/json;
            return 429 '{"error":"rate_limit_exceeded","message":"Çok fazla istek gönderildi. Lütfen bekleyin."}';
        }
    }
}
