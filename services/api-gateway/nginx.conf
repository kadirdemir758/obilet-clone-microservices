worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream trip_service {
        server trip-service:8003;
    }

    server {
        listen 80;
        server_name localhost;

        # ─── 🛣️ ŞEFFAF YÖNLENDİRME ───
        # Nginx burada sadece postacı. CORS başlıklarını FastAPI halledecek.
        location /api/v1/trips/ {
            proxy_pass http://trip_service;
            
            # Gelen IP ve Host bilgilerini koru
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Backend'den (FastAPI) gelen CORS başlıklarının tarayıcıya gitmesine izin ver
            proxy_pass_header Access-Control-Allow-Origin;
            proxy_pass_header Access-Control-Allow-Methods;
            proxy_pass_header Access-Control-Allow-Headers;
        }

        location /health {
            return 200 '{"status":"ok"}';
        }

        location / {
            return 404 '{"error":"Nginx_yolu_bulamadi"}';
        }
    }
}